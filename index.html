<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achadinhos Fatu — Links</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 16px;
        }
        .header h1 {
            color: white;
            font-size: 22px;
            font-weight: 700;
        }
        .header p {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-top: 4px;
        }
        .btn {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 12px;
            text-decoration: none;
            color: white;
            transition: all 0.2s;
        }
        .btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        .emoji { font-size: 24px; margin-right: 14px; }
        .nome { flex: 1; font-size: 16px; font-weight: 500; }
        .arrow { font-size: 18px; opacity: 0.6; }
        .footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">🛒</div>
            <h1>Achadinhos Fatu</h1>
            <p>Os melhores achados do dia!</p>
        </div>
        
        <a href="https://mercadolivre.com.br/produto-teste" target="_blank" class="btn">
            <span class="emoji">🛒</span>
            <span class="nome">Produto Teste — Whey 100%</span>
            <span class="arrow">→</span>
        </a>
        <div class="footer">Atualizado em 25/05/2026 15:33</div>
    </div>
</body>
</html>
