<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achadinhos Fatu — Links</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .container { max-width: 480px; width: 100%; }
        .header { text-align: center; margin-bottom: 32px; }
        .avatar-wrap {
            width: 96px; height: 96px; border-radius: 50%;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            padding: 3px; margin: 0 auto 16px; display: block;
        }
        .avatar-wrap img {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover; border: 3px solid #1a1a2e; display: block;
        }
        .header h1 { color: white; font-size: 22px; font-weight: 700; }
        .header p { color: rgba(255,255,255,0.6); font-size: 14px; margin-top: 4px; }
        .sociais { display: flex; justify-content: center; gap: 16px; margin-top: 12px; }
        .sociais a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px; }
        .empty { text-align: center; color: rgba(255,255,255,0.4); padding: 40px 0; font-size: 15px; }
        .footer { text-align: center; margin-top: 24px; color: rgba(255,255,255,0.3); font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar-wrap">
                <img src="https://unavatar.io/instagram/achadinhosfatu"
                     onerror="this.parentElement.innerHTML='<div style=width:90px;height:90px;border-radius:50%;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743);display:flex;align-items:center;justify-content:center;font-size:40px>🛒</div>'">
            </div>
            <h1>Achadinhos Fatu</h1>
            <p>Os melhores achados do dia! 🛍️</p>
            <div class="sociais">
                <a href="https://instagram.com/achadinhosfatu" target="_blank">📸 Instagram</a>
            </div>
        </div>
        <div class="empty">Novos produtos em breve! 🛒</div>
        <div class="footer">Atualizado em 25/05/2026 16:13</div>
    </div>
</body>
</html>
